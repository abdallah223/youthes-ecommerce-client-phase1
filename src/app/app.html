@let isAdminRoute = (isAdminRoute$ | async) ?? false;

@if (!isAdminRoute) {
  <div class="theme-storefront app-shell">
    <app-navbar />
    <main class="main-content main-content--store">
      <router-outlet />
    </main>
    <app-footer />
  </div>
} @else {
  <main class="main-content">
    <router-outlet />
  </main>
}
